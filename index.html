<!DOCTYPE html>
<html>
<head>
  <title>Phantom Dispatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="scanlines"></div>
<div class="vignette"></div>

<div id="menu" class="terminal">

  <h1 class="glow">👻 PHANTOM DISPATCH</h1>
  <p class="sub">Paranormal Investigation Network</p>

  <!-- LIFE SELECT -->
  <div id="lifeSelect">
    <h2>SELECT INVESTIGATOR FILE</h2>

    <div class="slotGrid">
      <button onclick="loadLife(1)">FILE 01</button>
      <button onclick="loadLife(2)">FILE 02</button>
      <button onclick="loadLife(3)">FILE 03</button>
    </div>

    <button class="bigBtn" onclick="openCreateLife()">+ CREATE NEW FILE</button>
  </div>

  <!-- CREATE LIFE -->
  <div id="createLife" class="hidden">
    <h2>CREATE INVESTIGATOR</h2>

    <input id="firstName" placeholder="FIRST NAME">
    <input id="lastName" placeholder="LAST NAME">

    <select id="characterSelect">
      <option value="hunter">GHOST HUNTER</option>
      <option value="investigator">FIELD INVESTIGATOR</option>
      <option value="rookie">ROOKIE</option>
    </select>

    <button class="bigBtn" onclick="saveLife()">SAVE FILE</button>
  </div>

  <!-- MAIN MENU -->
  <div id="mainMenu" class="hidden">
    <h2 id="welcomeText"></h2>

    <button class="bigBtn" onclick="startGame()">▶ CONTINUE DISPATCH</button>
    <button onclick="showInfo()">INFO</button>
    <button onclick="showCredits()">CREDITS</button>
    <button onclick="resetLife()">DELETE FILE</button>
  </div>

  <!-- INFO -->
  <div id="info" class="hidden">
    <h2>INFO</h2>
    <p>You are a contracted paranormal investigator responding to classified hauntings.</p>
    <button onclick="backMenu()">BACK</button>
  </div>

  <!-- CREDITS -->
  <div id="credits" class="hidden">
    <h2>CREDITS</h2>
    <p>PHANTOM DISPATCH — CASE FILE SYSTEM</p>
    <p>CREATED BY SKITMC</p>
    <button onclick="backMenu()">BACK</button>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
