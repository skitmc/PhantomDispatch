<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantom Dispatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="startup-screen">
    <div class="titleCard">
      <h1>PHANTOM DISPATCH</h1>
      <p>Horror investigation dispatch simulator. Choose a life slot and build your ghost hunting career.</p>
    </div>
    <div class="contentCard">
      <section id="lifeSelect" class="panel">
        <h2>Select Investigator File</h2>
        <div class="slotGrid" id="slotGrid"></div>
        <button class="bigBtn" onclick="openCreateLife()">+ CREATE NEW FILE</button>
      </section>
      <section id="createLife" class="panel hidden">
        <h2>Create Investigator</h2>
        <input id="firstName" type="text" placeholder="First Name" autocomplete="off">
        <input id="lastName" type="text" placeholder="Last Name" autocomplete="off">
        <label>Starting Balance</label>
        <input id="startingBalance" type="number" min="0" value="500">
        <label>Difficulty</label>
        <select id="difficultySelect">
          <option value="Easy">Easy</option>
          <option value="Medium" selected>Medium</option>
          <option value="Hard">Hard</option>
        </select>
        <div class="buttonRow">
          <button class="bigBtn" onclick="saveLife()">SAVE & START</button>
          <button class="smallBtn" onclick="backMenu()">CANCEL</button>
        </div>
      </section>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
